[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [
    "venv",
    ".pytest_cache",
    "data",
    "backend/alembic",
    "node_modules",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long, handled by black/ruff format
]
